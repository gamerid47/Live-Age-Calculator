<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credits</title>
    
    <style>

.credits{
    max-width:600px;
    margin:40px auto;
    padding:25px;
    background:#0f172a;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    font-family:sans-serif;
    color:white;
}

.credits h2{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
    color:#38bdf8;
    letter-spacing:1px;
}

.credit-item{
    display:flex;
    justify-content:space-between;
    padding:10px 12px;
    margin:6px 0;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    transition:0.2s;
}

.credit-item:hover{
    background:rgba(56,189,248,0.15);
    transform:scale(1.02);
}

.role{
    font-weight:600;
    color:#94a3b8;
}

.name{
    font-weight:500;
    color:#e2e8f0;
}

@media(max-width:500px){
    .credit-item{
        flex-direction:column;
        gap:4px;
    }
}

</style>

</head>
<body>
    <section class="credits">
